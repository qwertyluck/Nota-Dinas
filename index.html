<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator Nota Dinas Otomatis</title>
    <!-- Bootstrap untuk Tampilan yang Rapi -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Pustaka docx.js versi stabil dari jsDelivr (Alternatif unpkg yang lebih aman dari blokir) -->
    <script src="https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.umd.min.js"></script>
    <!-- Library FileSaver untuk Download File -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    
    <style>
        body { background-color: #f8f9fa; padding: 30px 0; }
        .card { box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .header-title { border-bottom: 2px solid #0d6efd; padding-bottom: 10px; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card p-4">
                <div class="header-title">
                    <h3 class="text-primary text-center fw-bold">KEJAKSAAN NEGERI MALUKU TENGGARA</h3>
                    <p class="text-muted text-center mb-0">Generator Nota Dinas Pencairan Anggaran</p>
                </div>

                <form id="notaForm">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Kepada</label>
                            <input type="text" id="kepada" class="form-control" value="Pejabat Pembuat Komitmen" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Dari</label>
                            <input type="text" id="dari" class="form-control" value="Kuasa Pengguna Anggaran" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Tanggal</label>
                            <input type="text" id="tanggal" class="form-control" value="15 Juli 2026" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Sifat</label>
                            <input type="text" id="sifat" class="form-control" value="Biasa" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Lampiran</label>
                            <input type="text" id="lampiran" class="form-control" value="-" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Perihal</label>
                            <input type="text" id="perihal" class="form-control" value="Nota Dinas Pencairan Anggaran" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Nomor ND (Angka saja)</label>
                            <input type="text" id="nomorNd" class="form-control" placeholder="Contoh: 123" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Bulan ND (Romawi/Angka)</label>
                            <input type="text" id="bulanNd" class="form-control" value="07" required>
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-bold">Detail Kegiatan (Sehubungan dengan...)</label>
                            <textarea id="kegiatan" class="form-control" rows="3" required>kegiatan operasional sehari-hari</textarea>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Nominal Anggaran (Rp)</label>
                            <input type="number" id="nominal" class="form-control" value="10000000" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">DIPA Tahun</label>
                            <input type="text" id="dipaTahun" class="form-control" value="2024" required>
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-bold">Nomor Mata Anggaran</label>
                            <input type="text" id="mataAnggaran" class="form-control" value="521211 dan 524113" required>
                        </div>
                    </div>

                    <div class="d-grid gap-2 mt-4">
                        <button type="button" onclick="generateWord()" class="btn btn-primary btn-lg">📥 Download Nota Dinas (.docx)</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
// Fungsi JavaScript untuk mengubah Angka menjadi Terbilang Indonesia
function terbilang(n) {
    const bilangan = ["", "Satu", "Dua", "Tiga", "Empat", "Lima", "Enam", "Tujuh", "Delapan", "Sembilan", "Sepuluh", "Sebelas"];
    if (n < 12) return bilangan[n];
    if (n < 20) return terbilang(n - 10) + " Belas";
    if (n < 100) return terbilang(Math.floor(n / 10)) + " Puluh " + terbilang(n % 10);
    if (n < 200) return "Seratus " + terbilang(n - 100);
    if (n < 1000) return terbilang(Math.floor(n / 100)) + " Ratus " + terbilang(n % 100);
    if (n < 2000) return "Seribu " + terbilang(n - 1000);
    if (n < 1000000) return terbilang(Math.floor(n / 1000)) + " Ribu " + terbilang(n % 1000);
    if (n < 1000000000) return terbilang(Math.floor(n / 1000000)) + " Juta " + terbilang(n % 1000000);
    return "Angka Terlalu Besar";
}

// Fungsi Utama Membuat Dokumen Word
function generateWord() {
    const btn = document.querySelector("button");
    const originalText = btn.innerHTML;
    
    // Validasi form dasar
    const form = document.getElementById('notaForm');
    if (!form.checkValidity()) {
        form.reportValidity();
        return;
    }

    // Cek apakah library docx berhasil dimuat oleh browser
    // Pada versi UMD, library mendaftarkan dirinya ke objek window.docx
    const docxLib = window.docx;
    if (!docxLib) {
        alert("Eror: Pustaka 'docx' gagal dimuat oleh browser Anda. Mohon pastikan komputer terhubung dengan internet atau nonaktifkan AdBlocker Anda untuk situs ini, lalu muat ulang (refresh) halaman.");
        return;
    }

    // Ubah tombol menjadi mode loading
    btn.disabled = true;
    btn.innerHTML = "⏳ Sedang memproses dokumen...";

    try {
        // Ambil Nilai dari Input Form
        const kepada = document.getElementById('kepada').value;
        const dari = document.getElementById('dari').value;
        const tanggal = document.getElementById('tanggal').value;
        const sifat = document.getElementById('sifat').value;
        const lampiran = document.getElementById('lampiran').value;
        const perihal = document.getElementById('perihal').value;
        const nomorNd = document.getElementById('nomorNd').value;
        const bulanNd = document.getElementById('bulanNd').value;
        const kegiatan = document.getElementById('kegiatan').value;
        const nominal = parseInt(document.getElementById('nominal').value) || 0;
        const dipaTahun = document.getElementById('dipaTahun').value;
        const mataAnggaran = document.getElementById('mataAnggaran').value;

        // Format mata uang dan terbilang
        const nominalFormat = new Intl.NumberFormat('id-ID').format(nominal);
        const teksTerbilang = terbilang(nominal) + " Rupiah";

        // Ekstraksi modul dari library docx yang terverifikasi aman
        const { Document, Packer, Paragraph, TextRun, AlignmentType, Table, TableRow, TableCell, WidthType, BorderStyle } = docxLib;

        // Pengaturan border transparan untuk tabel biodata atas
        const noBorder = { style: BorderStyle.NONE, size: 0, color: "auto" };
        const bordersTransparan = { top: noBorder, bottom: noBorder, left: noBorder, right: noBorder };

        // Inisialisasi Dokumen Word
        const doc = new Document({
            sections: [{
                properties: {},
                children: [
                    // KOP SURAT
                    new Paragraph({
                        alignment: AlignmentType.CENTER,
                        children: [
                            new TextRun({ text: "KEJAKSAAN REPUBLIK INDONESIA\n", bold: true, size: 24 }),
                            new TextRun({ text: "KEJAKSAAN TINGGI MALUKU\n", bold: true, size: 24 }),
                            new TextRun({ text: "KEJAKSAAN NEGERI MALUKU TENGGARA\n", bold: true, size: 24 }),
                            new TextRun({ text: "Jl. Cempaka Perumahan Pemda, Kel. Ohoijang Watdek, Kec. Kei Kecil, Kabupaten Maluku Tenggara\n", italic: true, size: 20 }),
                        ],
                    }),
                    // Garis Pembatas KOP
                    new Paragraph({
                        alignment: AlignmentType.CENTER,
                        children: [new TextRun({ text: "___________________________________________________________________________", bold: true })]
                    }),
                    new Paragraph({ text: "" }),

                    // TABEL INFORMASI
                    new Table({
                        width: { size: 100, type: WidthType.PERCENTAGE },
                        rows: [
                            ["Kepada", kepada],
                            ["Dari", dari],
                            ["Tanggal", tanggal],
                            ["Sifat", sifat],
                            ["Lampiran", lampiran],
                            ["Perihal", perihal]
                        ].map(item => new TableRow({
                            children: [
                                new TableCell({
                                    width: { size: 20, type: WidthType.PERCENTAGE },
                                    borders: bordersTransparan,
                                    children: [new Paragraph({ children: [new TextRun({ text: item[0], size: 22 })] })]
                                }),
                                new TableCell({
                                    width: { size: 80, type: WidthType.PERCENTAGE },
                                    borders: bordersTransparan,
                                    children: [new Paragraph({ children: [new TextRun({ text: ` :  ${item[1]}`, size: 22 })] })]
                                })
                            ]
                        }))
                    }),

                    // Garis Pembatas Bawah Tabel
                    new Paragraph({
                        alignment: AlignmentType.CENTER,
                        children: [new TextRun({ text: "___________________________________________________________________________", bold: true })]
                    }),
                    new Paragraph({ text: "" }),

                    // JUDUL NOTA DINAS
                    new Paragraph({
                        alignment: AlignmentType.CENTER,
                        children: [
                            new TextRun({ text: "NOTA DINAS\n", bold: true, size: 26 }),
                            new TextRun({ text: `Nomor: ND-${nomorNd}/Q.1.19/Cu.3/${bulanNd}/2026`, bold: true, size: 22 })
                        ]
                    }),
                    new Paragraph({ text: "" }),

                    // ISI PARAGRAF 1
                    new Paragraph({
                        alignment: AlignmentType.JUSTIFY,
                        children: [
                            new TextRun({ text: `Sehubungan dengan ${kegiatan} pada Kejaksaan Negeri Maluku Tenggara. menimbang adanya biaya yang timbul dengan kegiatan tersebut, maka Bersama ini dengan hormat kami sampaikan Nota Dinas Pencairan Anggaran dalam rangka mendukung kegiatan operasional sebagaimana dimaksud dengan nilai sebesar `, size: 22 }),
                            new TextRun({ text: `Rp. ${nominalFormat} `, bold: true, size: 22 }),
                            new TextRun({ text: `(${teksTerbilang}).`, italic: true, size: 22 })
                        ]
                    }),
                    new Paragraph({ text: "" }),

                    // ISI PARAGRAF 2
                    new Paragraph({
                        alignment: AlignmentType.JUSTIFY,
                        children: [
                            new TextRun({ text: `Kiranya dijadikan dasar untuk penyerapan anggaran berdasarkan DIPA Tahun ${dipaTahun} / Nomor Mata Anggaran ${mataAnggaran}.`, size: 22 })
                        ]
                    }),
                    new Paragraph({ text: "" }),

                    // PENUTUP
                    new Paragraph({
                        children: [new TextRun({ text: "Demikian untuk menjadi maklum.", size: 22 })]
                    }),
                    new Paragraph({ text: "" }),
                    new Paragraph({ text: "" }),

                    // TANDA TANGAN
                    new Paragraph({
                        alignment: AlignmentType.RIGHT,
                        children: [
                            new TextRun({ text: "Kuasa Pengguna Anggaran\n\n\n\n\n", size: 22 }),
                            new TextRun({ text: "Dr. Fadjar\n", bold: true, size: 22 }),
                            new TextRun({ text: "Jaksa Utama Pratama", size: 22 })
                        ]
                    }),
                    new Paragraph({ text: "" }),

                    // TEMBUSAN
                    new Paragraph({
                        children: [
                            new TextRun({ text: "Tembusan Yth.:\n", bold: true, size: 20 }),
                            new TextRun({ text: "1. Pejabat Pembuat Komitmen;\n2. Arsip.-", size: 20 })
                        ]
                    })
                ]
            }]
        });

        // Simpan menjadi file Word
        Packer.toBlob(doc).then(blob => {
            if (typeof saveAs !== 'undefined') {
                saveAs(blob, `Nota_Dinas_ND_${nomorNd}.docx`);
            } else {
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `Nota_Dinas_ND_${nomorNd}.docx`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                window.URL.revokeObjectURL(url);
            }

            btn.disabled = false;
            btn.innerHTML = originalText;
        }).catch(err => {
            alert("Terjadi kesalahan saat mengemas berkas.");
            btn.disabled = false;
            btn.innerHTML = originalText;
        });

    } catch (error) {
        alert("Terjadi eror internal: " + error.message);
        btn.disabled = false;
        btn.innerHTML = originalText;
    }
}
</script>

</body>
</html>
