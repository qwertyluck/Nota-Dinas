<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator Nota Dinas Super Presisi V5</title>
    
    <!-- Pustaka Bootstrap & docx.js dengan sistem Fallback otomatis (Online/Offline) -->
    <link href="bootstrap.min.css" rel="stylesheet" onerror="this.onerror=null; this.href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css';">
    <script src="docx.umd.min.js" onerror="this.onerror=null; this.src='https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.umd.min.js';"></script>
    <script src="FileSaver.min.js" onerror="this.onerror=null; this.src='https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js';"></script>
    
    <style>
        body { background-color: #f4f6f9; padding: 30px 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { box-shadow: 0 4px 20px rgba(0,0,0,0.08); border: none; border-radius: 12px; }
        .header-title { border-bottom: 3px solid #198754; padding-bottom: 15px; margin-bottom: 25px; }
        .section-divider { border-top: 2px dashed #dee2e6; margin: 25px 0; padding-top: 15px; }
        .bas-container { max-height: 200px; overflow-y: auto; border: 1px solid #ced4da; padding: 10px; border-radius: 6px; background-color: #fff; }
        .tembusan-item { display: flex; gap: 10px; margin-bottom: 8px; }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-9">
            <div class="card p-4 mb-5">
                <div class="header-title text-center">
                    <h3 class="text-success fw-bold mb-1">KEJAKSAAN NEGERI MALUKU TENGGARA</h3>
                    <p class="text-muted small mb-0">Sistem Generator Nota Dinas - Pembaruan Format Naskah Standar Baku</p>
                </div>

                <form id="notaForm">
                    <!-- BLOCK 1: ADMINISTRASI SURAT -->
                    <h5 class="text-success fw-bold">1. Administrasi Nota Dinas</h5>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Nomor ND (Angka saja)</label>
                            <input type="text" id="nomorNd" class="form-control" placeholder="Contoh: 99" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Bulan ND (Otomatis)</label>
                            <input type="text" id="bulanNd" class="form-control" readonly style="background-color: #e9ecef;">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Kepada</label>
                            <input type="text" id="kepada" class="form-control" value="Pejabat Pembuat Komitmen" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Dari</label>
                            <input type="text" id="dari" class="form-control" value="Kuasa Pengguna Anggaran" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Pilih Tanggal Nota Dinas</label>
                            <input type="date" id="tanggalKalender" class="form-control" onchange="updateFormatTanggal()" required>
                            <input type="hidden" id="tanggalTeks">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-bold">Sifat</label>
                            <input type="text" id="sifat" class="form-control" value="Biasa" required>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-bold">Lampiran</label>
                            <input type="text" id="lampiran" class="form-control" value="-" required>
                        </div>
                        <div class="col-md-12">
                            <label class="form-label fw-bold">Perihal</label>
                            <input type="text" id="perihal" class="form-control" value="Nota Dinas Pencairan Anggaran" required>
                        </div>
                    </div>

                    <!-- BLOCK 2: DETAIL ANGGARAN & DIPA -->
                    <div class="section-divider"></div>
                    <h5 class="text-success fw-bold">2. Anggaran & Pilihan Mata Anggaran (BAS)</h5>
                    <div class="row g-3">
                        <div class="col-12">
                            <label class="form-label fw-bold">Detail Kegiatan (Sehubungan dengan...)</label>
                            <textarea id="kegiatan" class="form-control" rows="2" required>kegiatan operasional sehari-hari</textarea>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Nominal Anggaran (Rp)</label>
                            <input type="number" id="nominal" class="form-control" value="10000000" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">DIPA Tahun</label>
                            <input type="text" id="dipaTahun" class="form-control" value="2024" required>
                        </div>
                        
                        <div class="col-12">
                            <label class="form-label fw-bold">Pilih Nomor Mata Anggaran (BAS K/L):</label>
                            <div class="bas-container" id="basContainer">
                                <!-- Generated by JS -->
                            </div>
                        </div>
                    </div>

                    <!-- BLOCK 3: PEJABAT PENANDATANGAN -->
                    <div class="section-divider"></div>
                    <h5 class="text-success fw-bold">3. Pejabat Penandatangan</h5>
                    <div class="row g-3">
                        <div class="col-md-12">
                            <label class="form-label fw-bold">Pilih Profil Pejabat</label>
                            <select id="pejabatSelect" class="form-select" onchange="loadProfilPejabat()">
                                <option value="fadjar">Dr. Fadjar - Kuasa Pengguna Anggaran</option>
                                <option value="plt_kpa">Plt. Kuasa Pengguna Anggaran</option>
                                <option value="ppk_pembinaan">Pejabat Pembuat Komitmen (PPK)</option>
                                <option value="custom">-- Input Manual Pejabat Baru --</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-bold">Jabatan Struktur</label>
                            <input type="text" id="pjbJabatan" class="form-control" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-bold">Nama Pejabat</label>
                            <input type="text" id="pjbNama" class="form-control" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-bold">Pangkat / Golongan</label>
                            <input type="text" id="pjbPangkat" class="form-control" required>
                        </div>
                    </div>

                    <!-- BLOCK 4: TEMBUSAN DINAMIS -->
                    <div class="section-divider"></div>
                    <h5 class="text-success fw-bold">4. Bagian Tembusan Surat</h5>
                    <div class="col-12">
                        <label class="form-label fw-bold">Daftar Tembusan Yth:</label>
                        <div id="tembusanContainer">
                            <div class="tembusan-item">
                                <input type="text" class="form-control tembusan-input" value="Pejabat Pembuat Komitmen;" required>
                                <button type="button" class="btn btn-danger btn-sm" onclick="hapusBarisTembusan(this)">Hapus</button>
                            </div>
                            <div class="tembusan-item">
                                <input type="text" class="form-control tembusan-input" value="Arsip.-" required>
                                <button type="button" class="btn btn-danger btn-sm" onclick="hapusBarisTembusan(this)">Hapus</button>
                            </div>
                        </div>
                        <button type="button" class="btn btn-outline-primary btn-sm mt-2" onclick="tambahBarisTembusan()">➕ Tambah Baris Tembusan</button>
                    </div>

                    <!-- BUTTON GENERATE -->
                    <div class="d-grid gap-2 mt-4">
                        <button type="button" onclick="generateWord()" class="btn btn-success btn-lg fw-bold">📥 Download Nota Dinas Sesuai Rincian Perbaikan (.docx)</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
const dataAkunBAS = [
    { kode: "521111", nama: "Belanja Keperluan Perkantoran" },
    { kode: "521115", nama: "Belanja Honorarium Output Kegiatan" },
    { kode: "521119", nama: "Belanja Barang Operasional Lainnya" },
    { kode: "521121", nama: "Belanja Langganan Daya dan Jasa" },
    { kode: "521128", nama: "Belanja Jasa Satpam, Pengemudi, Petugas Kebersihan, dan Pramubakti" },
    { kode: "521211", nama: "Belanja Bahan" },
    { kode: "521213", nama: "Belanja Honorarium Output Non-Kegiatan" },
    { kode: "521219", nama: "Belanja Barang Non-Operasional Lainnya" },
    { kode: "522111", nama: "Belanja Jasa Profesi" },
    { kode: "522112", nama: "Belanja Jasa Publikasi/Iklan" },
    { kode: "522114", nama: "Belanja Jasa Sewa" },
    { kode: "522115", nama: "Belanja Jasa Konsultan" },
    { kode: "523111", nama: "Belanja Pemeliharaan Gedung dan Bangunan" },
    { kode: "523121", nama: "Belanja Pemeliharaan Peralatan dan Mesin" },
    { kode: "523131", nama: "Belanja Pemeliharaan Jalan, Irigasi, dan Jaringan" },
    { kode: "524111", nama: "Belanja Perjalanan Dinas Biasa Dalam Negeri" },
    { kode: "524113", nama: "Belanja Perjalanan Dinas Dalam Kota" },
    { kode: "524114", nama: "Belanja Perjalanan Dinas Paket Meeting Dalam Kota" },
    { kode: "524119", nama: "Belanja Perjalanan Dinas Paket Meeting Luar Kota" }
];

const masterPejabat = {
    fadjar: { jabatan: "Kuasa Pengguna Anggaran", nama: "Dr. Fadjar", pangkat: "Jaksa Utama Pratama" },
    plt_kpa: { jabatan: "Plt. Kuasa Pengguna Anggaran", nama: "Nama Pejabat Plt", pangkat: "Jaksa Madya" },
    ppk_pembinaan: { jabatan: "Pejabat Pembuat Komitmen", nama: "Nama Pejabat PPK", pangkat: "Jaksa Muda" },
    custom: { jabatan: "", nama: "", pangkat: "" }
};

document.addEventListener("DOMContentLoaded", function() {
    const hariIni = new Date();
    const tahun = hariIni.getFullYear();
    const bulan = String(hariIni.getMonth() + 1).padStart(2, '0');
    const tanggal = String(hariIni.getDate()).padStart(2, '0');
    document.getElementById("tanggalKalender").value = `${tahun}-${bulan}-${tanggal}`;
    updateFormatTanggal();

    const containerBAS = document.getElementById("basContainer");
    dataAkunBAS.forEach(akun => {
        const div = document.createElement("div");
        div.className = "form-check";
        const checkedStr = (akun.kode === "521211" || akun.kode === "524113") ? "checked" : "";
        div.innerHTML = `
            <input class="form-check-input bas-checkbox" type="checkbox" value="${akun.kode}" id="bas_${akun.kode}" ${checkedStr}>
            <label class="form-check-label" for="bas_${akun.kode}"><strong>${akun.kode}</strong> - ${akun.nama}</label>
        `;
        containerBAS.appendChild(div);
    });

    loadProfilPejabat();
});

function loadProfilPejabat() {
    const pilihan = document.getElementById("pejabatSelect").value;
    const data = masterPejabat[pilihan];
    document.getElementById("pjbJabatan").value = data.jabatan;
    document.getElementById("pjbNama").value = data.nama;
    document.getElementById("pjbPangkat").value = data.pangkat;
    const isCustom = pilihan === "custom";
    document.getElementById("pjbJabatan").readOnly = !isCustom;
    document.getElementById("pjbNama").readOnly = !isCustom;
    document.getElementById("pjbPangkat").readOnly = !isCustom;
}

function updateFormatTanggal() {
    const nilaiKalender = document.getElementById("tanggalKalender").value;
    if (!nilaiKalender) return;
    const bulanIndo = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
    const parts = nilaiKalender.split("-");
    document.getElementById("tanggalTeks").value = `${parseInt(parts[2])} ${bulanIndo[parseInt(parts[1]) - 1]} ${parts[0]}`;
    document.getElementById("bulanNd").value = parts[1];
}

function tambahBarisTembusan() {
    const container = document.getElementById("tembusanContainer");
    const div = document.createElement("div");
    div.className = "tembusan-item";
    div.innerHTML = `
        <input type="text" class="form-control tembusan-input" placeholder="Tembusan baru..." required>
        <button type="button" class="btn btn-danger btn-sm" onclick="hapusBarisTembusan(this)">Hapus</button>
    `;
    container.appendChild(div);
}

function hapusBarisTembusan(btn) { btn.parentElement.remove(); }

function terbilang(n) {
    const bilangan = ["", "Satu", "Dua", "Tiga", "Empat", "Lima", "Enam", "Tujuh", "Delapan", "Sembilan", "Sepuluh", "Sebelas"];
    if (n < 12) return bilangan[n];
    if (n < 20) return terbilang(n - 10) + " Belas";
    if (n < 100) return terbilang(Math.floor(n / 10)) + " Puluh " + terbilang(n % 10);
    if (n < 200) return "Seratus " + terbilang(n - 100);
    if (n < 1000) return terbilang(Math.floor(n / 100)) + " Ratus " + terbilang(n % 100);
    if (n < 2000) return "Seribu " + terbilang(n - 1000);
    if (n < 1000000) return terbilang(Math.floor(n / 1000)) + " Ribu " + terbilang(n % 1000);
    if (n < 1000000000) return terbilang(Math.floor(n / 1000000)) + " Juta " + terbilang(n % 1000000);
    return "Angka Terlalu Besar";
}

async function ambilGambarLogo(url) {
    try {
        const respon = await fetch(url);
        if (!respon.ok) throw new Error();
        const blob = await respon.blob();
        return await blob.arrayBuffer();
    } catch {
        // Fallback: Mengembalikan elemen kosong/null alih-alih merusak seluruh skrip pembentukan berkas
        return null;
    }
}

async function generateWord() {
    const btn = document.querySelector("button");
    const originalText = btn.innerHTML;
    
    const form = document.getElementById('notaForm');
    if (!form.checkValidity()) {
        form.reportValidity();
        return;
    }

    const checkboxes = document.querySelectorAll('.bas-checkbox:checked');
    if (checkboxes.length === 0) {
        alert("Mohon pilih minimal satu Nomor Mata Anggaran (BAS).");
        return;
    }
    const arrayKodeBAS = Array.from(checkboxes).map(cb => cb.value);
    const teksMataAnggaran = arrayKodeBAS.join(" dan ");

    const inputsTembusan = document.querySelectorAll('.tembusan-input');
    const arrayTembusan = Array.from(inputsTembusan).map(inp => inp.value);

    const docxLib = window.docx;
    if (!docxLib) {
        alert("Pustaka pembentuk berkas belum termuat sempurna.");
        return;
    }

    btn.disabled = true;
    btn.innerHTML = "⏳ Menata dokumen secara presisi...";

    try {
        const kepada = document.getElementById('kepada').value;
        const dari = document.getElementById('dari').value;
        const tanggal = document.getElementById('tanggalTeks').value;
        const sifat = document.getElementById('sifat').value;
        const lampiran = document.getElementById('lampiran').value;
        const perihal = document.getElementById('perihal').value;
        const nomorNd = document.getElementById('nomorNd').value;
        const bulanNd = document.getElementById('bulanNd').value;
        const kegiatan = document.getElementById('kegiatan').value;
        const nominal = parseInt(document.getElementById('nominal').value) || 0;
        const dipaTahun = document.getElementById('dipaTahun').value;
        
        const nilaiKalender = document.getElementById("tanggalKalender").value;
        const tahunNd = nilaiKalender ? nilaiKalender.split("-")[0] : "2026";
        
        const pjbJabatan = document.getElementById('pjbJabatan').value;
        const pjbNama = document.getElementById('pjbNama').value;
        const pjbPangkat = document.getElementById('pjbPangkat').value;

        const nominalFormat = new Intl.NumberFormat('id-ID').format(nominal);
        const teksTerbilang = terbilang(nominal) + " Rupiah";

        const { Document, Packer, Paragraph, TextRun, AlignmentType, Table, TableRow, TableCell, WidthType, BorderStyle, ImageRun } = docxLib;

        const noBorder = { style: BorderStyle.NONE, size: 0, color: "auto" };
        const cellBorders = { top: noBorder, bottom: noBorder, left: noBorder, right: noBorder };
        const doubleBorderBottom = { style: BorderStyle.DOUBLE, size: 12, color: "000000" };

        let imageBuffer = await ambilGambarLogo('logo-kejaksaan.png');
        
        // Pembuatan komponen kolom logo pendukung Kop Surat
        let logoCellChildren = [];
        if (imageBuffer) {
            logoCellChildren.push(new Paragraph({ 
                alignment: AlignmentType.CENTER, 
                children: [new ImageRun({ data: imageBuffer, transformation: { width: 65, height: 65 } })] 
            }));
        }

        const doc = new Document({
            styles: { default: { document: { run: { font: "Arial", size: 24, color: "000000" } } } },
            sections: [{
                properties: { page: { margin: { top: 1134, bottom: 1134, left: 1701, right: 1134 } } },
                children: [
                    // === LOGO & KOP SURAT ===
                    new Table({
                        width: { size: 100, type: WidthType.PERCENTAGE },
                        rows: [
                            new TableRow({
                                children: [
                                    new TableCell({
                                        width: { size: 15, type: WidthType.PERCENTAGE }, borders: cellBorders,
                                        children: logoCellChildren
                                    }),
                                    new TableCell({
                                        width: { size: 85, type: WidthType.PERCENTAGE }, borders: cellBorders,
                                        children: [
                                            new Paragraph({
                                                alignment: AlignmentType.CENTER, spacing: { after: 20 },
                                                children: [
                                                    new TextRun({ text: "KEJAKSAAN REPUBLIK INDONESIA\n", bold: false, size: 24 }),
                                                    new TextRun({ text: "KEJAKSAAN TINGGI MALUKU\n", bold: false, size: 24 }),
                                                    new TextRun({ text: "KEJAKSAAN NEGERI MALUKU TENGGARA\n", bold: true, size: 24 }),
                                                    new TextRun({ text: "Jl. Cempaka Perumahan Pemda, Kel. Ohoijang Watdek, Kec. Kei Kecil, Kabupaten Maluku Tenggara", italic: true, size: 16 }),
                                                ]
                                            })
                                        ]
                                    })
                                ]
                            })
                        ]
                    }),

                    new Paragraph({ spacing: { before: 180, after: 180 } }),

                    // === JUDUL NOTA DINAS & NOMOR ===
                    new Paragraph({
                        alignment: AlignmentType.CENTER, spacing: { after: 40 },
                        children: [
                            new TextRun({ text: "NOTA DINAS", bold: true, underline: {}, size: 26 })
                        ]
                    }),
                    new Paragraph({
                        alignment: AlignmentType.CENTER, spacing: { after: 240 },
                        children: [
                            new TextRun({ text: `Nomor: ND - ${nomorNd}/Q.1.19/Cu.3/${bulanNd}/${tahunNd}`, bold: false, size: 24 })
                        ]
                    }),

                    // === TABEL METADATA ===
                    new Table({
                        width: { size: 100, type: WidthType.PERCENTAGE },
                        rows: [
                            ["Kepada", kepada], ["Dari", dari], ["Tanggal", tanggal], ["Sifat", sifat], ["Lampiran", lampiran], ["Perihal", perihal]
                        ].map((item, index, arr) => new TableRow({
                            children: [
                                new TableCell({ 
                                    width: { size: 15, type: WidthType.PERCENTAGE }, 
                                    borders: (index === arr.length - 1) ? { top: noBorder, bottom: doubleBorderBottom, left: noBorder, right: noBorder } : cellBorders, 
                                    children: [new Paragraph({ children: [new TextRun({ text: item[0] })], spacing: { line: 280 } })] 
                                }),
                                new TableCell({ 
                                    width: { size: 85, type: WidthType.PERCENTAGE }, 
                                    borders: (index === arr.length - 1) ? { top: noBorder, bottom: doubleBorderBottom, left: noBorder, right: noBorder } : cellBorders, 
                                    children: [new Paragraph({ children: [new TextRun({ text: `:  ${item[1]}` })], spacing: { line: 280 } })] 
                                })
                            ]
                        }))
                    }),

                    new Paragraph({ spacing: { before: 240 } }),

                    // === ISI PARAGRAF 1 ===
                    new Paragraph({
                        alignment: AlignmentType.JUSTIFY, indent: { firstLine: 720 }, 
                        spacing: { before: 0, after: 0, line: 360 },
                        children: [
                            new TextRun({ text: `Sehubungan dengan ${kegiatan} pada Kejaksaan Negeri Maluku Tenggara. menimbang adanya biaya yang timbul dengan kegiatan tersebut, maka Bersama ini dengan hormat kami sampaikan Nota Dinas Pencairan Anggaran dalam rangka mendukung kegiatan operasional sebagaimana dimaksud dengan nilai sebesar ` }),
                            new TextRun({ text: `${nominalFormat} `, bold: true }),
                            new TextRun({ text: `(${teksTerbilang}).`, italic: true })
                        ]
                    }),

                    // === ISI PARAGRAF 2 ===
                    new Paragraph({
                        alignment: AlignmentType.JUSTIFY, indent: { firstLine: 720 }, 
                        spacing: { before: 0, after: 0, line: 360 },
                        children: [
                            new TextRun({ text: `Kiranya dijadikan dasar untuk penyerapan anggaran berdasarkan DIPA Tahun ${dipaTahun} / Nomor Mata Anggaran ${teksMataAnggaran}.` })
                        ]
                    }),

                    // === PENUTUP ===
                    new Paragraph({ 
                        indent: { firstLine: 720 }, 
                        spacing: { before: 0, after: 0, line: 360 }, 
                        children: [new TextRun({ text: "Demikian untuk menjadi maklum." })] 
                    }),
                    
                    new Paragraph({ spacing: { before: 400 } }),

                    // === BLOK TANDA TANGAN ===
                    new Table({
                        width: { size: 100, type: WidthType.PERCENTAGE },
                        rows: [
                            new TableRow({
                                children: [
                                    new TableCell({ width: { size: 50, type: WidthType.PERCENTAGE }, borders: cellBorders, children: [] }),
                                    new TableCell({
                                        width: { size: 50, type: WidthType.PERCENTAGE }, borders: cellBorders,
                                        children: [
                                            new Paragraph({
                                                alignment: AlignmentType.CENTER, spacing: { line: 240 },
                                                children: [
                                                    new TextRun({ text: `${pjbJabatan}\n\n\n\n`, size: 24 }), 
                                                    new TextRun({ text: `${pjbNama}\n`, bold: true, size: 24 }),
                                                    new TextRun({ text: `${pjbPangkat}`, size: 24 })
                                                ]
                                            })
                                        ]
                                    })
                                ]
                            })
                        ]
                    }),
                    
                    new Paragraph({ spacing: { before: 300 } }),

                    // === TEMBUSAN ===
                    new Paragraph({
                        spacing: { line: 240, after: 40 },
                        children: [
                            new TextRun({ text: "Tembusan Yth.:", bold: false, size: 22 })
                        ]
                    }),
                    ...arrayTembusan.map((t, idx) => new Paragraph({
                        spacing: { before: 0, after: 0, line: 240 }, 
                        indent: { left: 360, hanging: 360 },
                        children: [
                            new TextRun({ text: `${idx + 1}.\t${t}`, size: 22 })
                        ]
                    }))
                ]
            }]
        });

        Packer.toBlob(doc).then(blob => {
            saveAs(blob, `Nota_Dinas_ND_${nomorNd}.docx`);
            btn.disabled = false;
            btn.innerHTML = originalText;
        });

    } catch (error) {
        alert("Eror internal: " + error.message);
        btn.disabled = false;
        btn.innerHTML = originalText;
    }
}
</script>

</body>
</html>
