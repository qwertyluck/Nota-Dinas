<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator Nota Dinas Presisi V4</title>
    <!-- Bootstrap untuk Tampilan Form -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Pustaka docx.js versi UMD -->
    <script src="https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.umd.min.js"></script>
    <!-- Library FileSaver untuk Download File -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    
    <style>
        body { background-color: #f8f9fa; padding: 30px 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: none; border-radius: 10px; }
        .header-title { border-bottom: 3px solid #198754; padding-bottom: 15px; margin-bottom: 25px; }
        .form-label { font-size: 0.9rem; color: #495057; }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card p-4 mb-5">
                <div class="header-title text-center">
                    <h3 class="text-success fw-bold mb-1">KEJAKSAAN NEGERI MALUKU TENGGARA</h3>
                    <p class="text-muted small mb-0">Generator Nota Dinas Otomatis (Input Kalender Interaktif)</p>
                </div>

                <form id="notaForm">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Nomor ND (Angka saja)</label>
                            <input type="text" id="nomorNd" class="form-control" placeholder="Contoh: 123" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Bulan ND (Otomatis dari Kalender)</label>
                            <input type="text" id="bulanNd" class="form-control" readonly style="background-color: #e9ecef;">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Kepada</label>
                            <input type="text" id="kepada" class="form-control" value="Pejabat Pembuat Komitmen" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Dari</label>
                            <input type="text" id="dari" class="form-control" value="Kuasa Pengguna Anggaran" required>
                        </div>
                        <div class="col-md-12">
                            <label class="form-label fw-bold">Pilih Tanggal Nota Dinas (Klik Ikon Kalender)</label>
                            <!-- Input bertipe date untuk memunculkan kalender pop-up -->
                            <input type="date" id="tanggalKalender" class="form-control" onchange="updateFormatTanggal()" required>
                            <!-- Input tersembunyi/penyimpanan hasil konversi teks Indonesia -->
                            <input type="hidden" id="tanggalTeks">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Sifat</label>
                            <input type="text" id="sifat" class="form-control" value="Biasa" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Lampiran</label>
                            <input type="text" id="lampiran" class="form-control" value="-" required>
                        </div>
                        <div class="col-md-12">
                            <label class="form-label fw-bold">Perihal</label>
                            <input type="text" id="perihal" class="form-control" value="Nota Dinas Pencairan Anggaran" required>
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-bold">Detail Kegiatan (Sehubungan dengan...)</label>
                            <textarea id="kegiatan" class="form-control" rows="3" required>kegiatan operasional sehari-hari</textarea>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Nominal Anggaran (Rp)</label>
                            <input type="number" id="nominal" class="form-control" value="10000000" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">DIPA Tahun</label>
                            <input type="text" id="dipaTahun" class="form-control" value="2024" required>
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-bold">Nomor Mata Anggaran</label>
                            <input type="text" id="mataAnggaran" class="form-control" value="521211 dan 524113" required>
                        </div>
                    </div>

                    <div class="d-grid gap-2 mt-4">
                        <button type="button" onclick="generateWord()" class="btn btn-success btn-lg fw-bold">📥 Download Nota Dinas Sesuai Softfile (.docx)</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
// Fungsi yang berjalan otomatis saat halaman pertama kali dibuka
document.addEventListener("DOMContentLoaded", function() {
    const hariIni = new Date();
    
    // Format YYYY-MM-DD agar bisa diterima oleh input type="date"
    const tahun = hariIni.getFullYear();
    const bulan = String(hariIni.getMonth() + 1).padStart(2, '0');
    const tanggal = String(hariIni.getDate()).padStart(2, '0');
    
    // Set tanggal kalender ke hari ini secara otomatis
    const inputKalender = document.getElementById("tanggalKalender");
    inputKalender.value = `${tahun}-${bulan}-${tanggal}`;
    
    // Jalankan fungsi update agar text Indonesia dan Bulan ND langsung terisi otomatis
    updateFormatTanggal();
});

// Fungsi untuk mengonversi pilihan kalender menjadi format teks Indonesia & update nomor bulan
function updateFormatTanggal() {
    const nilaiKalender = document.getElementById("tanggalKalender").value;
    if (!nilaiKalender) return;

    const bulanIndo = [
        "Januari", "Februari", "Maret", "April", "Mei", "Juni", 
        "Juli", "Agustus", "September", "Oktober", "November", "Desember"
    ];

    // Memecah string tanggal YYYY-MM-DD
    const parts = nilaiKalender.split("-");
    const tahun = parts[0];
    const indexBulan = parseInt(parts[1]) - 1;
    const tanggal = parseInt(parts[2]);

    // 1. Gabungkan menjadi teks tanggal Indonesia (Misal: 15 Juli 2026)
    const teksIndonesia = `${tanggal} ${bulanIndo[indexBulan]} ${tahun}`;
    document.getElementById("tanggalTeks").value = teksIndonesia;

    // 2. Update otomatis Bulan ND dengan angka 2 digit (Misal: 07) sesuai pilihan kalender
    document.getElementById("bulanNd").value = parts[1];
}

// Fungsi untuk mengubah Angka menjadi Terbilang Indonesia
function terbilang(n) {
    const bilangan = ["", "Satu", "Dua", "Tiga", "Empat", "Lima", "Enam", "Tujuh", "Delapan", "Sembilan", "Sepuluh", "Sebelas"];
    if (n < 12) return bilangan[n];
    if (n < 20) return terbilang(n - 10) + " Belas";
    if (n < 100) return terbilang(Math.floor(n / 10)) + " Puluh " + terbilang(n % 10);
    if (n < 200) return "Seratus " + terbilang(n - 100);
    if (n < 1000) return terbilang(Math.floor(n / 100)) + " Ratus " + terbilang(n % 100);
    if (n < 2000) return "Seribu " + terbilang(n - 1000);
    if (n < 1000000) return terbilang(Math.floor(n / 1000)) + " Ribu " + terbilang(n % 1000);
    if (n < 1000000000) return terbilang(Math.floor(n / 1000000)) + " Juta " + terbilang(n % 1000000);
    return "Angka Terlalu Besar";
}

// Fungsi pembantu untuk mengambil file gambar logo lokal
async function ambilGambarLogo(url) {
    const respon = await fetch(url);
    if (!respon.ok) {
        throw new Error("Gagal memuat file logo-kejaksaan.png.");
    }
    const blob = await respon.blob();
    return await blob.arrayBuffer();
}

async function generateWord() {
    const btn = document.querySelector("button");
    const originalText = btn.innerHTML;
    
    const form = document.getElementById('notaForm');
    if (!form.checkValidity()) {
        form.reportValidity();
        return;
    }

    const docxLib = window.docx;
    if (!docxLib) {
        alert("Pustaka 'docx' gagal dimuat. Periksa koneksi internet.");
        return;
    }

    btn.disabled = true;
    btn.innerHTML = "⏳ Menata dokumen secara presisi...";

    try {
        const kepada = document.getElementById('kepada').value;
        const dari = document.getElementById('dari').value;
        // Mengambil hasil konversi tanggal teks Indonesia
        const tanggal = document.getElementById('tanggalTeks').value;
        const sifat = document.getElementById('sifat').value;
        const lampiran = document.getElementById('lampiran').value;
        const perihal = document.getElementById('perihal').value;
        const nomorNd = document.getElementById('nomorNd').value;
        const bulanNd = document.getElementById('bulanNd').value;
        const kegiatan = document.getElementById('kegiatan').value;
        const nominal = parseInt(document.getElementById('nominal').value) || 0;
        const dipaTahun = document.getElementById('dipaTahun').value;
        const mataAnggaran = document.getElementById('mataAnggaran').value;

        const nominalFormat = new Intl.NumberFormat('id-ID').format(nominal);
        const teksTerbilang = terbilang(nominal) + " Rupiah";

        const { Document, Packer, Paragraph, TextRun, AlignmentType, Table, TableRow, TableCell, WidthType, BorderStyle, ImageRun } = docxLib;

        const noBorder = { style: BorderStyle.NONE, size: 0, color: "auto" };
        const cellBorders = { top: noBorder, bottom: noBorder, left: noBorder, right: noBorder };
        const lineBorder = { style: BorderStyle.SINGLE, size: 18, color: "000000" };

        let imageBuffer;
        try {
            imageBuffer = await ambilGambarLogo('logo-kejaksaan.png');
        } catch (imgError) {
            alert("Peringatan: Berkas 'logo-kejaksaan.png' tidak ditemukan di folder utama GitHub Anda.");
            btn.disabled = false;
            btn.innerHTML = originalText;
            return;
        }

        const doc = new Document({
            styles: {
                default: {
                    document: {
                        run: { font: "Arial", size: 24, color: "000000" }
                    }
                }
            },
            sections: [{
                properties: {
                    page: { margin: { top: 1134, bottom: 1134, left: 1701, right: 1134 } }
                },
                children: [
                    // === LOGO & KOP SURAT ===
                    new Table({
                        width: { size: 100, type: WidthType.PERCENTAGE },
                        rows: [
                            new TableRow({
                                children: [
                                    new TableCell({
                                        width: { size: 15, type: WidthType.PERCENTAGE },
                                        borders: cellBorders,
                                        children: [
                                            new Paragraph({
                                                alignment: AlignmentType.CENTER,
                                                children: [
                                                    new ImageRun({
                                                        data: imageBuffer,
                                                        transformation: { width: 65, height: 65 }
                                                    })
                                                ]
                                            })
                                        ]
                                    }),
                                    new TableCell({
                                        width: { size: 85, type: WidthType.PERCENTAGE },
                                        borders: cellBorders,
                                        children: [
                                            new Paragraph({
                                                alignment: AlignmentType.CENTER,
                                                spacing: { after: 20 },
                                                children: [
                                                    new TextRun({ text: "KEJAKSAAN REPUBLIK INDONESIA\n", bold: true, size: 26 }),
                                                    new TextRun({ text: "KEJAKSAAN TINGGI MALUKU\n", bold: true, size: 26 }),
                                                    new TextRun({ text: "KEJAKSAAN NEGERI MALUKU TENGGARA\n", bold: true, size: 26 }),
                                                    new TextRun({ text: "Jl. Cempaka Perumahan Pemda, Kel. Ohoijang Watdek, Kec. Kei Kecil, Kabupaten Maluku Tenggara", italic: true, size: 16 }),
                                                ]
                                            })
                                        ]
                                    })
                                ]
                            })
                        ]
                    }),

                    // Garis Pembatas KOP
                    new Paragraph({ spacing: { before: 40 } }),
                    new Table({
                        width: { size: 100, type: WidthType.PERCENTAGE },
                        rows: [
                            new TableRow({
                                children: [
                                    new TableCell({
                                        borders: { top: noBorder, bottom: lineBorder, left: noBorder, right: noBorder },
                                        children: []
                                    })
                                ]
                            })
                        ]
                    }),
                    new Paragraph({ spacing: { before: 200, after: 200 } }),

                    // === JUDUL & NOMOR NOTA DINAS ===
                    new Paragraph({
                        alignment: AlignmentType.CENTER,
                        spacing: { after: 300 },
                        children: [
                            new TextRun({ text: "NOTA DINAS\n", bold: true, size: 28 }),
                            new TextRun({ text: `Nomor: ND - ${nomorNd}/Q.1.19/Cu.3/${bulanNd}/2026`, bold: true, size: 24 })
                        ]
                    }),

                    // === TABEL METADATA (Kepada, Dari, dll) ===
                    new Table({
                        width: { size: 100, type: WidthType.PERCENTAGE },
                        rows: [
                            ["Kepada", kepada],
                            ["Dari", dari],
                            ["Tanggal", tanggal],
                            ["Sifat", sifat],
                            ["Lampiran", lampiran],
                            ["Perihal", perihal]
                        ].map(item => new TableRow({
                            children: [
                                new TableCell({
                                    width: { size: 15, type: WidthType.PERCENTAGE },
                                    borders: cellBorders,
                                    children: [new Paragraph({ children: [new TextRun({ text: item[0] })], spacing: { line: 280 } })]
                                }),
                                new TableCell({
                                    width: { size: 85, type: WidthType.PERCENTAGE },
                                    borders: cellBorders,
                                    children: [new Paragraph({ children: [new TextRun({ text: `:  ${item[1]}` })], spacing: { line: 280 } })]
                                })
                            ]
                        }))
                    }),

                    // Garis Pembatas Tengah
                    new Paragraph({ spacing: { before: 100, after: 100 } }),
                    new Table({
                        width: { size: 100, type: WidthType.PERCENTAGE },
                        rows: [
                            new TableRow({
                                children: [
                                    new TableCell({
                                        borders: { top: noBorder, bottom: lineBorder, left: noBorder, right: noBorder },
                                        children: []
                                    })
                                ]
                            })
                        ]
                    }),
                    new Paragraph({ spacing: { before: 200, after: 200 } }),

                    // === ISI PARAGRAF 1 ===
                    new Paragraph({
                        alignment: AlignmentType.JUSTIFY,
                        indent: { firstLine: 720 },
                        spacing: { after: 200, line: 360 },
                        children: [
                            new TextRun({ text: `Sehubungan dengan ${kegiatan} pada Kejaksaan Negeri Maluku Tenggara. menimbang adanya biaya yang timbul dengan kegiatan tersebut, Bersama ini kami sampaikan Nota Dinas Pencairan Anggaran dalam rangka mendukung kegiatan operasional sebagaimana dimaksud dengan nilai sebesar ` }),
                            new TextRun({ text: `${nominalFormat} `, bold: true }),
                            new TextRun({ text: `(${teksTerbilang}).`, italic: true })
                        ]
                    }),

                    // === ISI PARAGRAF 2 ===
                    new Paragraph({
                        alignment: AlignmentType.JUSTIFY,
                        indent: { firstLine: 720 },
                        spacing: { after: 200, line: 360 },
                        children: [
                            new TextRun({ text: `Kiranya dijadikan dasar untuk penyerapan anggaran berdasarkan DIPA Tahun ${dipaTahun} / Nomor Mata Anggaran ${mataAnggaran}.` })
                        ]
                    }),

                    // === PENUTUP ===
                    new Paragraph({
                        indent: { firstLine: 720 },
                        spacing: { after: 600, line: 360 },
                        children: [new TextRun({ text: "Demikian untuk menjadi maklum." })]
                    }),

                    // === TANDA TANGAN ===
                    new Table({
                        width: { size: 100, type: WidthType.PERCENTAGE },
                        rows: [
                            new TableRow({
                                children: [
                                    new TableCell({ width: { size: 55, type: WidthType.PERCENTAGE }, borders: cellBorders, children: [] }),
                                    new TableCell({
                                        width: { size: 45, type: WidthType.PERCENTAGE },
                                        borders: cellBorders,
                                        children: [
                                            new Paragraph({
                                                alignment: AlignmentType.LEFT,
                                                spacing: { line: 240 },
                                                children: [
                                                    new TextRun({ text: "Kuasa Pengguna Anggaran\n\n\n\n\n", size: 24 }),
                                                    new TextRun({ text: "Dr. Fadjar\n", bold: true, size: 24 }),
                                                    new TextRun({ text: "Jaksa Utama Pratama", size: 24 })
                                                ]
                                            })
                                        ]
                                    })
                                ]
                            })
                        ]
                    }),
                    new Paragraph({ spacing: { before: 400 } }),

                    // === TEMBUSAN ===
                    new Paragraph({
                        spacing: { line: 240 },
                        children: [
                            new TextRun({ text: "Tembusan Yth.:\n", bold: true, size: 22 }),
                            new TextRun({ text: "Pejabat Pembuat Komitmen;\n", size: 22 }),
                            new TextRun({ text: "A r s i p .-", size: 22 })
                        ]
                    })
                ]
            }]
        });

        // Proses Unduh Berkas Word
        Packer.toBlob(doc).then(blob => {
            if (typeof saveAs !== 'undefined') {
                saveAs(blob, `Nota_Dinas_ND_${nomorNd}.docx`);
            } else {
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `Nota_Dinas_ND_${nomorNd}.docx`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                window.URL.revokeObjectURL(url);
            }
            btn.disabled = false;
            btn.innerHTML = originalText;
        });

    } catch (error) {
        alert("Terjadi eror internal: " + error.message);
        btn.disabled = false;
        btn.innerHTML = originalText;
    }
}
</script>

</body>
</html>
